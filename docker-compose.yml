services:
  # 1. The Database
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: catalog_db
    ports:
      - "5432:5432"
    networks:
      - app-network

  # 2. NestJS Core
  backend-core:
    build: ./backend-core
    container_name: backend-core
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASS=password
      - DB_NAME=catalog_db
      - PYTHON_SERVICE_URL=http://backend-ai:8000
    depends_on:
      - db
      - backend-ai
    networks:
      - app-network

  # 3. FastAPI AI Service
  backend-ai:
    build: ./backend-ai
    ports:
      - "8000:8000"
    networks:
      - app-network

  # 4. React Frontend
  frontend:
    build: ./frontend
    container_name: react_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
    networks:
      - app-network

# --- GLOBAL SETTINGS (No indentation here) ---
networks:
  app-network:
    driver: bridge