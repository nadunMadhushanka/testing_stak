services:
  # 1. The Database
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: catalog_db
    ports:
      - "5432:5432"
    networks:
      - app-network

  # 2. NestJS Core
  backend-core:
    image: nadun845/backend-core:latest # Changed from build to image
    container_name: backend-core
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASS=password
      - DB_NAME=catalog_db
      - PYTHON_SERVICE_URL=http://backend-ai:8000
    depends_on:
      - db
      - backend-ai
    networks:
      - app-network

  # 3. FastAPI AI Service
  backend-ai:
    image: nadun845/backend-ai:latest # Changed from build to image
    container_name: backend-ai
    ports:
      - "8000:8000"
    networks:
      - app-network

  # 4. Watchtower (The "Automation Secret")
  # This will automatically update your containers when you push to GitHub!
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 30 --cleanup
    networks:
      - app-network

  # 4. React Frontend
  frontend:
    image: nadun845/frontend:latest # Changed from build
    container_name: react_frontend
    ports:
      - "5173:80" # Map local 5173 to Nginx port 80
    environment:
      - VITE_API_URL=http://localhost:3000
    networks:
      - app-network

# --- GLOBAL SETTINGS ---
networks:
  app-network:
    driver: bridge